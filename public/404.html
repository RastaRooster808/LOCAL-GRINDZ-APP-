<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>The Kingdom Emporium</title>
  <script>
    // GitHub Pages SPA: redirect 404s to index with encoded path
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 2).join('/') +
      '/?p=' + encodeURIComponent(l.pathname.split('/').slice(2).join('/') + l.search) +
      (l.hash || '')
    );
  </script>
</head>
</html>
